apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: taskmanager/backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: task-manager-config
            - secretRef:
                name: task-manager-secret
#          readinessProbe:
#            httpGet:
#              path: /actuator/health
#              port: 8080
#            initialDelaySeconds: 20
#            periodSeconds: 10
#          livenessProbe:
#            httpGet:
#              path: /actuator/health
#              port: 8080
#            initialDelaySeconds: 40
#            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: task-manager
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080

