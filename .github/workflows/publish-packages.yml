# ============================================================================
# Publish to GitHub Packages & Docker Hub
# ============================================================================
# Publishes Docker images to Docker Hub (backend & frontend separately)
# and the Maven package to GitHub Packages on every release or manual trigger.
# ============================================================================

name: Publish to GitHub Packages & Docker Hub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g., 1.0.0)"
        required: true
        type: string

env:
  DOCKERHUB_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/task-management-backend
  DOCKERHUB_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/task-management-frontend

jobs:
  # ── Publish Maven Package ─────────────────────────────────────────────────
  publish-maven:
    name: Publish — Maven to GitHub Packages
    runs-on: ubuntu-latest
    concurrency:
      group: maven-publish-${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.version || github.ref_name || github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Determine publish version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_VERSION="${{ github.event.release.tag_name }}"
          else
            RAW_VERSION="${{ github.event.inputs.version }}"
          fi

          MAVEN_VERSION="${RAW_VERSION#v}"

          if [ -z "$MAVEN_VERSION" ]; then
            echo "Resolved Maven version is empty"
            exit 1
          fi

          echo "maven_version=$MAVEN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if Maven version already exists
        id: version_check
        run: |
          VERSION="${{ steps.version.outputs.maven_version }}"
          POM_URL="https://maven.pkg.github.com/${{ github.repository }}/com/taskmanager/task-management-backend/${VERSION}/task-management-backend-${VERSION}.pom"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "$GITHUB_ACTOR:$GITHUB_TOKEN" "$POM_URL")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version ${VERSION} already exists. Skipping Maven deploy."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.version_check.outputs.exists != 'true'
        run: >
          mvn clean deploy -DskipTests -B
          -Drevision=${{ steps.version.outputs.maven_version }}
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish Backend Docker Image to Docker Hub ─────────────────────────────
  publish-docker-backend:
    name: Publish — Backend Image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKERHUB_BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish Frontend Docker Image to Docker Hub ───────────────────────────
  publish-docker-frontend:
    name: Publish — Frontend Image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKERHUB_FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

