# ============================================================================
# Publish to GitHub Packages & Docker Hub
# ============================================================================
# Publishes Docker images to Docker Hub (backend & frontend separately)
# and the Maven package to GitHub Packages on every release or manual trigger.
# ============================================================================

name: Publish to GitHub Packages & Docker Hub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g., 1.0.0)"
        required: true
        type: string

env:
  DOCKERHUB_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/task-management-backend
  DOCKERHUB_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/task-management-frontend
  MAVEN_ARTIFACT_ID: task-management-backend
  MAVEN_GROUP_PATH: io/github/nadeeshamedagama
  MAVEN_PACKAGE_NAME: io.github.nadeeshamedagama.task-management-backend

jobs:
  # ── Publish Maven Package ─────────────────────────────────────────────────
  publish-maven:
    name: Publish — Maven to GitHub Packages
    runs-on: ubuntu-latest
    concurrency:
      group: maven-publish-${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.version || github.ref_name || github.run_id }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Determine publish version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_VERSION="${{ github.event.release.tag_name }}"
          else
            RAW_VERSION="${{ github.event.inputs.version }}"
          fi

          MAVEN_VERSION="${RAW_VERSION#v}"

          if [ -z "$MAVEN_VERSION" ]; then
            echo "Resolved Maven version is empty"
            exit 1
          fi

          REPO_PATH_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          echo "maven_version=$MAVEN_VERSION" >> "$GITHUB_OUTPUT"
          echo "repo_path=$REPO_PATH_LOWER" >> "$GITHUB_OUTPUT"

      - name: Check package linkage
        uses: actions/github-script@v8
        env:
          PACKAGE_NAME: ${{ env.MAVEN_PACKAGE_NAME }}
        with:
          script: |
            const packageName = process.env.PACKAGE_NAME;
            const currentRepo = process.env.GITHUB_REPOSITORY.toLowerCase();
            const owner = context.repo.owner;

            let pkg;
            try {
              const res = await github.rest.packages.getPackageForUser({
                package_type: "maven",
                package_name: packageName,
                username: owner,
              });
              pkg = res.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (!pkg) {
              core.info(`Package ${packageName} does not exist yet under ${owner}.`);
              return;
            }

            const linkedRepo = pkg.repository?.full_name?.toLowerCase();
            if (linkedRepo && linkedRepo !== currentRepo) {
              core.setFailed(
                `Maven package ${packageName} is linked to ${linkedRepo}, not ${currentRepo}. ` +
                `GitHub Packages will reject publish with 422 until the package is moved/deleted or coordinates change.`
              );
              return;
            }

            core.info(`Package ${packageName} is linked to ${linkedRepo || "(none)"}.`);

      - name: Check if Maven version already exists
        id: version_check
        run: |
          VERSION="${{ steps.version.outputs.maven_version }}"
          METADATA_URL="https://maven.pkg.github.com/${{ steps.version.outputs.repo_path }}/${{ env.MAVEN_GROUP_PATH }}/${{ env.MAVEN_ARTIFACT_ID }}/maven-metadata.xml"
          METADATA=$(curl -fsSL -u "$GITHUB_ACTOR:$GITHUB_TOKEN" "$METADATA_URL" || true)

          if echo "$METADATA" | grep -q "<version>${VERSION}</version>"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version ${VERSION} already exists. Skipping Maven deploy."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.version_check.outputs.exists != 'true'
        run: >
          mvn clean deploy -DskipTests -B
          -Drevision=${{ steps.version.outputs.maven_version }}
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ steps.version.outputs.repo_path }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish Backend Docker Image to Docker Hub ─────────────────────────────
  publish-docker-backend:
    name: Publish — Backend Image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_BACKEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKERHUB_BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish Frontend Docker Image to Docker Hub ───────────────────────────
  publish-docker-frontend:
    name: Publish — Frontend Image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_FRONTEND_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKERHUB_FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

